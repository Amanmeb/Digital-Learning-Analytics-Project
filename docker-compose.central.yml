services:
  postgres:
    image: postgres:16.3-alpine
    container_name: cdlaid_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cdlaid_user
      POSTGRES_PASSWORD: CdlaidDB2025!Strong
      POSTGRES_DB: cdlaid_analytics
    volumes:
      - cdlaid_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdlaid_user -d cdlaid_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: cdlaid_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: MoodleRoot2025!Strong
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodle_user
      MYSQL_PASSWORD: MoodleDB2025!Strong
    volumes:
      - cdlaid_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  moodle:
    build:
      context: ./moodle
      dockerfile: Dockerfile
    container_name: cdlaid_moodle
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - cdlaid_moodle_data:/var/www/moodledata
      - ./moodle/config.php:/var/www/html/config.php
    depends_on:
      mysql:
        condition: service_healthy

  lrs:
    image: yetanalytics/lrsql:latest
    container_name: cdlaid_lrs
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      LRSQL_DB_TYPE: postgres
      LRSQL_DB_HOST: postgres
      LRSQL_DB_PORT: 5432
      LRSQL_DB_NAME: cdlaid_analytics
      LRSQL_DB_USER: cdlaid_user
      LRSQL_DB_PASSWORD: CdlaidDB2025!Strong
      LRSQL_DB_SCHEMA: lrs
      LRSQL_API_KEY_DEFAULT: ${LRS_KEY}
      LRSQL_API_SECRET_DEFAULT: ${LRS_SECRET}
      LRSQL_ADMIN_USER_DEFAULT: ${LRS_ADMIN_USER}
      LRSQL_ADMIN_PASS_DEFAULT: ${LRS_ADMIN_PASSWORD}
      LRSQL_ALLOW_ALL_ORIGINS: "true"
    depends_on:
      postgres:
        condition: service_healthy
    command: bin/run_postgres.sh

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: cdlaid_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cdlaid_user:CdlaidDB2025!Strong@postgres:5432/cdlaid_analytics
      API_SECRET_KEY: ${API_SECRET_KEY}
      LRS_ENDPOINT: http://cdlaid_lrs:8080/xapi/statements
      LRS_KEY: ${LRS_KEY}
      LRS_SECRET: ${LRS_SECRET}
      ENVIRONMENT: ${ENVIRONMENT}
      DEMO_MODE: ${DEMO_MODE}
      SERVER_ID: ${SERVER_ID}
      SCHOOL_ID: ${SCHOOL_ID}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./templates:/app/templates

volumes:
  cdlaid_pg_data:
  cdlaid_mysql_data:
  cdlaid_moodle_data: