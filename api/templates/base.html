<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CDLAID Admin{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
        .navbar {
            background: #375C7A;
            color: white;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar a { color: white; text-decoration: none; margin-left: 20px; font-size: 14px; }
        .navbar a:hover { color: #81BC00; }
        .brand { font-size: 18px; font-weight: bold; color: #81BC00; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .card {
            background: white;
            border-radius: 6px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        .card h2 { color: #375C7A; margin-bottom: 16px; font-size: 18px; }
        .btn {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }
        .btn-primary { background: #81BC00; color: white; }
        .btn-secondary { background: #375C7A; color: white; }
        .btn-danger { background: #943266; color: white; }
        .alert {
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .alert-warning { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
        .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #375C7A; color: white; padding: 10px 12px; text-align: left; }
        td { padding: 10px 12px; border-bottom: 1px solid #eee; }
        tr:hover td { background: #f9f9f9; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 14px; margin-bottom: 6px; color: #555; }
        input, select, textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .notification-badge {
            background: #943266;
            color: white;
            border-radius: 50%;
            padding: 2px 7px;
            font-size: 12px;
            margin-left: 6px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <span class="brand">CDLAID Admin</span>
        <div>
            <a href="/admin">Dashboard</a>
            <a href="/admin/schools">Schools</a>
            <a href="/admin/settings">Settings</a>
            <a href="/admin/import">Import Data</a>
            <a href="/api/docs">API Docs</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
