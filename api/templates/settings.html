{% extends "base.html" %}
{% block title %}Settings -- CDLAID Admin{% endblock %}
{% block content %}
<div class="card">
    <h2>System Settings</h2>
    <p style="font-size:13px;color:#666;margin-bottom:16px;">
        Changes here apply permanently for all users.
        Dashboard filter overrides are session only.
    </p>
    <form method="POST" action="/admin/settings/update">
        {% for setting in settings %}
        <div class="form-group">
            <label>{{ setting.setting_key }}</label>
            <input
                type="text"
                name="{{ setting.setting_key }}"
                value="{{ setting.setting_value }}"
            >
            <small style="color:#999;font-size:12px;">{{ setting.description }}</small>
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">Save All Settings</button>
    </form>
</div>
{% endblock %}
